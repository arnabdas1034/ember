<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shared conversation · Ember</title>
    <style>
      :root { --clay:#CC785C; --cream:#F5F4EE; --sunk:#EFEDE4; --ink:#2A2622; --faint:#8A8175; --line:#E4E1D6; }
      body { margin:0; font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif; background:var(--cream); color:var(--ink); }
      .serif { font-family:Georgia,'Times New Roman',serif; }
      .wrap { max-width:720px; margin:0 auto; padding:40px 20px 80px; }
      .bubble-user { background:var(--sunk); border-radius:16px; padding:12px 16px; display:inline-block; max-width:80%; }
      pre { background:#f0eee6; padding:12px; border-radius:10px; overflow:auto; }
      code { font-family:ui-monospace,Menlo,monospace; font-size:13px; }
      a { color:var(--clay); }
      .msg { margin-bottom:24px; line-height:1.6; }
      header { border-bottom:1px solid var(--line); }
    </style>
  </head>
  <body>
    <header><div class="wrap" style="padding:16px 20px"><span class="serif" style="color:var(--clay)">✳</span> <b class="serif">Ember</b> <span style="color:var(--faint);font-size:13px">· shared conversation</span></div></header>
    <div class="wrap" id="root">Loading…</div>
    <script>
      function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      function md(text){
        let h = esc(text)
        h = h.replace(/```([\s\S]*?)```/g,(_m,c)=>'<pre><code>'+c.replace(/^\n/,'')+'</code></pre>')
        h = h.replace(/`([^`]+)`/g,'<code>$1</code>')
        h = h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
        h = h.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
        h = h.replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br/>')
        return '<p>'+h+'</p>'
      }
      const id = location.pathname.split('/').pop()
      fetch('/api/shared/' + id).then(r => r.ok ? r.json() : Promise.reject()).then(chat => {
        const root = document.getElementById('root')
        root.innerHTML = '<h1 class="serif" style="margin-bottom:28px">' + esc(chat.title || 'Conversation') + '</h1>'
        for (const m of chat.messages || []) {
          const div = document.createElement('div'); div.className = 'msg'
          if (m.role === 'user') div.innerHTML = '<div style="text-align:right"><span class="bubble-user">' + esc(m.text) + '</span></div>'
          else div.innerHTML = md(m.text)
          root.appendChild(div)
        }
      }).catch(() => { document.getElementById('root').innerHTML = '<p style="color:var(--faint)">This shared conversation was not found.</p>' })
    </script>
  </body>
</html>
